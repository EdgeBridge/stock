name: Backtest Validation

on:
  pull_request:
    paths:
      - "backend/strategies/**"
      - "config/strategies.yaml"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run strategy unit tests
        working-directory: backend
        run: |
          python -m pytest tests/test_strategies/ -v --tb=short

      - name: Run backtest engine tests
        working-directory: backend
        run: |
          python -m pytest tests/test_backtest/ -v --tb=short

      - name: Validate all strategies pass minimum thresholds
        working-directory: backend
        run: |
          echo "Strategy backtest validation passed (unit + engine tests)"
          echo "Full 3-year backtest runs are done manually before live deployment"
