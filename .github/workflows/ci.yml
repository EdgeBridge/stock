name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        run: |
          python -m pytest tests/ -q --tb=short --cov=. --cov-report=xml

      - name: Check coverage >= 90%
        working-directory: backend
        run: |
          coverage=$(python -m pytest tests/ --cov=. --cov-report=term 2>/dev/null | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          echo "Coverage: ${coverage}%"
          if [ "$(echo "$coverage < 90" | bc)" -eq 1 ]; then
            echo "Coverage below 90%!"
            exit 1
          fi

  scenario-test:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scenario tests
        working-directory: backend
        run: |
          python -m pytest tests/scenarios/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check and build
        working-directory: frontend
        run: npm run build
